# ---------------------------------------------------------------------------
# Shared fragments
# ---------------------------------------------------------------------------
x-app-environment: &app-environment
  PGUSER: pgquser
  PGPASSWORD: pgqpw
  PGDATABASE: pgqdb
  PGHOST: db
  PGPORT: 5432

x-app-base: &app-base
  build: .
  working_dir: /app
  restart: "no"
  environment: *app-environment

# ---------------------------------------------------------------------------
# Services
# ---------------------------------------------------------------------------
services:

  # --- PostgreSQL ------------------------------------------------------------
  db:
    image: postgres:${POSTGRES_VERSION:-16}
    restart: "no"
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/pg/data
    environment:
      POSTGRES_USER: pgquser
      POSTGRES_PASSWORD: pgqpw
      POSTGRES_DB: pgqdb
      PGDATA: /var/lib/pg/data
      POSTGRES_INITDB_ARGS: >-
        --encoding=UTF8
        -c jit=off
        -c synchronous_commit=off
        -c full_page_writes=off
        -c fsync=off
        -c checkpoint_timeout=30min
        -c max_wal_size=4GB
        -c checkpoint_completion_target=0.9
        -c shared_buffers=256MB
        -c vacuum_buffer_usage_limit=8MB
        -c autovacuum_naptime=5s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgquser -d pgqdb || exit 1"]
      interval: 250ms
      retries: 10

  # --- Schema setup ----------------------------------------------------------
  populate:
    <<: *app-base
    depends_on:
      db:
        condition: service_healthy
    command: >
      /bin/sh -c "(uv -n run --frozen pgq install || uv -n run --frozen pgq autovac); exit 0"

  # --- Test suite ------------------------------------------------------------
  test:
    <<: *app-base
    depends_on:
      populate:
        condition: service_completed_successfully
    command: uv -n run --frozen pytest

  # --- Benchmark -------------------------------------------------------------
  benchmark:
    <<: *app-base
    depends_on:
      populate:
        condition: service_completed_successfully
    command: uv -n run --frozen tools/benchmark.py
