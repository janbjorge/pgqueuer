name: PGQueuer CI Pipeline
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
jobs:
  run-benchmark:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-24.04]
        pgdriver: ["apg", "apgpool", "psy", "mem"]
        postgres-version: ["16"]
        strategy: ["throughput", "drain"]
    env:
      PGUSER: pgquser
      PGDATABASE: pgqdb
      PGPASSWORD: pgqpw
      PGHOST: localhost
    name: Run PGQueuer Benchmark
    runs-on: ${{ matrix.os }}
    timeout-minutes: 5
    services:
      postgres:
        image: postgres:${{ matrix.postgres-version }}
        env:
          POSTGRES_USER: ${{ env.PGUSER }}
          POSTGRES_DB: ${{ env.PGDATABASE }}
          POSTGRES_PASSWORD: ${{ env.PGPASSWORD }}
          POSTGRES_INITDB_ARGS: >
            --encoding=UTF8 -c jit=off -c synchronous_commit=off -c full_page_writes=off -c fsync=off -c checkpoint_timeout=30min -c max_wal_size=4GB -c checkpoint_completion_target=0.9 -c shared_buffers=256MB -c vacuum_buffer_usage_limit=8MB -c autovacuum_naptime=5s

        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5 --tmpfs /var/lib/postgresql/data:rw
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Check that JIT is off
        run: psql -h localhost -U $PGUSER -d $PGDATABASE -c "SHOW jit;"
      - name: Install PGQueuer
        run: |
          uv sync --all-extras --frozen
          uv run --frozen pgq install
          uv run --frozen pgq autovac
      - name: Set Branch or Tag Name
        id: get_ref
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            echo "REF_NAME=${GITHUB_HEAD_REF}" >> $GITHUB_ENV
          else
            echo "REF_NAME=${GITHUB_REF#refs/heads/}" >> $GITHUB_ENV
          fi
      - name: Benchmark
        run: |
          PYTHONUNBUFFERED=1 uv run python3 tools/benchmark.py \
            --driver ${{ matrix.pgdriver }} \
            --strategy ${{ matrix.strategy }} \
            --output-json benchmark.json
      - name: Upload Benchmark Result
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ matrix.strategy }}-${{ matrix.pgdriver }}
          path: benchmark.json
  validate-benchmark:
    needs: [run-benchmark]
    name: Validate Benchmark Results
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install Dependencies
        run: uv sync --frozen
      - name: Download Benchmark Results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          path: current
      - name: Fetch Benchmark History
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run python3 -m tools.fetch_history --dest benchmark-data
      - name: Validate RPS Against Main History
        run: |
          PYTHONUNBUFFERED=1 uv run python3 -m tools.compare_rps \
            --data-dir benchmark-data \
            --current-dir current
  store-benchmark:
    needs: [run-benchmark]
    if: github.ref == 'refs/heads/main'
    name: Store Benchmark Results
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
    concurrency:
      group: benchmark-store
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install Dependencies
        run: uv sync --frozen
      - name: Download Benchmark Results
        uses: actions/download-artifact@v4
        with:
          pattern: benchmark-*
          path: current
      - name: Fetch Benchmark History
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: uv run python3 -m tools.fetch_history --dest benchmark-data
      - name: Append Fresh Results
        run: |
          uv run python3 -m tools.append_benchmarks \
            --data-dir benchmark-data \
            --new-dir current
      - name: Upload Benchmark History
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-history
          path: benchmark-data/benchmark
          retention-days: 90
  run-tests:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        # Sparse matrix: every Python against anchor PG 16,
        # plus every PG against anchor Python 3.12.
        # Covers the full range of both axes in 10 jobs instead of 30.
        include:
          # All Python versions × PG 16 (anchor)
          - python-version: "3.10"
            postgres-version: "16"
          - python-version: "3.11"
            postgres-version: "16"
          - python-version: "3.12"
            postgres-version: "16"
          - python-version: "3.13"
            postgres-version: "16"
          - python-version: "3.14"
            postgres-version: "16"
          # All remaining PG versions × Python 3.12 (anchor)
          - python-version: "3.12"
            postgres-version: "13"
          - python-version: "3.12"
            postgres-version: "14"
          - python-version: "3.12"
            postgres-version: "15"
          - python-version: "3.12"
            postgres-version: "17"
          - python-version: "3.12"
            postgres-version: "18"
    env:
      CI: 1
      PYTHONASYNCIODEBUG: 1
      PYTHONDEBUG: 1
      PYTHONFAULTHANDLER: 1
      POSTGRES_VERSION: ${{ matrix.postgres-version }}
      TESTCONTAINERS_RYUK_DISABLED: "true"
      TESTCONTAINERS_HOST_OVERRIDE: "localhost"
    name: "Test Py ${{ matrix.python-version }} / PG ${{ matrix.postgres-version }}"
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Prefetch docker images
        run: docker pull postgres:${{ matrix.postgres-version }}
      - name: Set up Python
        run: uv sync --python ${{ matrix.python-version }} --all-extras --frozen
      - name: Run Full Test Suite
        run: uv run pytest --cov=pgqueuer --cov-report=xml --cov-report=term-missing --durations=15
  run-windows-tests:
    if: github.event_name != 'schedule'
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    env:
      CI: 1
      PYTHONASYNCIODEBUG: 1
      PYTHONDEBUG: 1
      PYTHONFAULTHANDLER: 1
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: root
      PGDATABASE: pgq
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install PGQueuer
        run: uv sync --all-extras --frozen
      - name: Start preinstalled PostgreSQL
        shell: pwsh
        run: |
          $svc = Get-Service -Name "postgresql*" | Select-Object -First 1
          if (-not $svc) { throw "PostgreSQL service not found on windows-latest runner" }
          Set-Service -Name $svc.Name -StartupType Manual
          Start-Service -Name $svc.Name
          & "$env:PGBIN\pg_isready" -h $env:PGHOST -p $env:PGPORT
      - name: Provision test database
        shell: pwsh
        run: |
          & "$env:PGBIN\psql" -U $env:PGUSER -h $env:PGHOST -p $env:PGPORT -d postgres -c "CREATE DATABASE $env:PGDATABASE;"
      - name: Run Windows Tests
        run: uv run pytest test/windows/ --durations=10
      - name: Force psycopg backend (drop asyncpg)
        run: uv pip uninstall asyncpg
      - name: Smoke `pgq install` / `pgq uninstall` against psycopg
        run: |
          uv run pgq install
          uv run pgq verify --expect present
          uv run pgq uninstall
          uv run pgq verify --expect absent
  run-checks:
    if: github.event_name != 'schedule'
    name: Lint, Typecheck & Architecture
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install Dev Environment
        run: uv sync --all-extras --frozen
      - name: Run Ruff Linter
        if: ${{ always() }}
        run: uv run ruff check .
      - name: Check Ruff Formatting
        if: ${{ always() }}
        run: uv run ruff format . --check
      - name: Run Import Linter (Hexagonal Architecture Validation)
        if: ${{ always() }}
        run: uv run lint-imports
      - name: Run Mypy Type Check
        if: ${{ always() }}
        run: uv run mypy .
      - name: Validate PR Title (Conventional Commits)
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false
          subjectPattern: ^[a-z].+[^.]$
          subjectPatternError: "Subject must start lowercase and not end with a period"
  complete-pipeline:
    if: github.event_name != 'schedule'
    needs: [validate-benchmark, run-tests, run-windows-tests, run-checks]
    runs-on: ubuntu-24.04
    steps:
      - name: Confirm All Tests Completed
        run: echo "All tests completed successfully."
